services:

  # ─────────────────────────────────────────────────────────────────────────────
  # FLEET + SYNTHETICS + OBSERVABILITY (all managed from cluster-east)
  # ─────────────────────────────────────────────────────────────────────────────

  # One-shot: initialises Fleet, creates the fleet-server agent policy (with
  # fleet_server integration), creates the synthetics agent policy, creates an
  # enrollment token for elastic-agent-synthetics, and registers the private
  # location in Kibana Synthetics.  Runs BEFORE fleet-server so fleet-server
  # finds its policy immediately on startup.
  fleet-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    depends_on:
      setup:
        condition: service_healthy
      kibana-east:
        condition: service_healthy
    networks:
      - net-east
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    # Use list form so bash receives the script as a real argument — this lets
    # $(...) command substitutions work.  Use $$ for shell-only variables so
    # Docker Compose does not try to interpolate them.
    command:
      - bash
      - -c
      - |
        set -e
        if [ -f config/certs/tokens/agent-enrollment-token ]; then
          echo "Tokens already present — skipping fleet-setup."
          exit 0
        fi

        echo "=== Initialising Fleet ==="
        until curl -sf --cacert config/certs/ca/ca.crt \
            -u "elastic:${ELASTIC_PASSWORD}" \
            -H "kbn-xsrf: true" \
            -X POST "https://kibana-east:5601/api/fleet/setup" 2>/dev/null \
            | grep -q '"isInitialized"'; do
          echo "Fleet not ready — retrying in 10 s..."; sleep 10
        done
        echo "Fleet initialised."

        echo "=== Creating Fleet Server agent policy (idempotent) ==="
        EXISTING_FS=$$(curl -sf --cacert config/certs/ca/ca.crt \
          -u "elastic:${ELASTIC_PASSWORD}" \
          "https://kibana-east:5601/api/fleet/agent_policies" \
          | grep -oE '"id":"[^"]*","name":"Fleet Server Policy"' | head -1 | grep -oE '^"id":"[^"]*"' | cut -d'"' -f4)
        if [ -n "$$EXISTING_FS" ]; then
          FS_POLICY_ID="$$EXISTING_FS"
          echo "Re-using existing Fleet Server policy: $$FS_POLICY_ID"
        else
          FS_POLICY_RESP=$$(curl -sf --cacert config/certs/ca/ca.crt \
            -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "https://kibana-east:5601/api/fleet/agent_policies" \
            -H "Content-Type: application/json" -H "kbn-xsrf: true" \
            -d '{"name":"Fleet Server Policy","namespace":"default"}')
          FS_POLICY_ID=$$(echo "$$FS_POLICY_RESP" | sed -n 's/.*"item":{"id":"\([^"]*\)".*/\1/p')
          echo "Created Fleet Server policy: $$FS_POLICY_ID"
        fi

        echo "=== Getting fleet_server package version ==="
        FS_VERSION=$$(curl -sf --cacert config/certs/ca/ca.crt \
          -u "elastic:${ELASTIC_PASSWORD}" \
          "https://kibana-east:5601/api/fleet/epm/packages/fleet_server" \
          | grep -oE '"version":"[0-9][0-9.]*"' | head -1 | cut -d'"' -f4)
        echo "fleet_server package version: $$FS_VERSION"

        echo "=== Adding fleet_server integration to Fleet Server policy ==="
        curl -sf --cacert config/certs/ca/ca.crt \
          -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "https://kibana-east:5601/api/fleet/package_policies" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d "{\"name\":\"fleet-server-1\",\"policy_id\":\"$$FS_POLICY_ID\",\"namespace\":\"default\",\"enabled\":true,\"package\":{\"name\":\"fleet_server\",\"version\":\"$$FS_VERSION\"},\"inputs\":[{\"type\":\"fleet-server\",\"enabled\":true,\"streams\":[],\"vars\":{}}]}"
        echo "Fleet Server integration added."

        echo "=== Saving fleet-server policy ID ==="
        mkdir -p config/certs/tokens
        echo -n "$$FS_POLICY_ID" > config/certs/tokens/fleet-server-policy-id
        chmod 640 config/certs/tokens/fleet-server-policy-id

        echo "=== Creating Synthetics agent policy ==="
        SYNTH_POLICY_RESP=$$(curl -sf --cacert config/certs/ca/ca.crt \
          -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "https://kibana-east:5601/api/fleet/agent_policies" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d '{"name":"Synthetics Private Location","namespace":"default","monitoring_enabled":["logs","metrics"]}')
        SYNTH_POLICY_ID=$$(echo "$$SYNTH_POLICY_RESP" | sed -n 's/.*"item":{"id":"\([^"]*\)".*/\1/p')
        echo "Synthetics policy ID: $$SYNTH_POLICY_ID"

        echo "=== Creating synthetics enrollment token ==="
        TOKEN_RESP=$$(curl -sf --cacert config/certs/ca/ca.crt \
          -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "https://kibana-east:5601/api/fleet/enrollment_api_keys" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d "{\"policy_id\":\"$$SYNTH_POLICY_ID\"}")
        ENROLL_TOKEN=$$(echo "$$TOKEN_RESP" | sed -n 's/.*"api_key":"\([^"]*\)".*/\1/p')
        echo -n "$$ENROLL_TOKEN" > config/certs/tokens/agent-enrollment-token
        chmod 640 config/certs/tokens/agent-enrollment-token
        echo "Synthetics enrollment token saved."

        echo "=== Registering private location in Kibana Synthetics ==="
        curl -sf --cacert config/certs/ca/ca.crt \
          -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "https://kibana-east:5601/api/synthetics/private_locations" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d "{\"label\":\"docker-private\",\"agentPolicyId\":\"$$SYNTH_POLICY_ID\",\"tags\":[\"docker\",\"demo\"]}"
        echo "Private location registered."

        echo "=== Fixing Fleet default output to point at west-es01 ==="
        curl -sf --cacert config/certs/ca/ca.crt \
          -u "elastic:${ELASTIC_PASSWORD}" \
          -X PUT "https://kibana-east:5601/api/fleet/outputs/fleet-default-output" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d "{\"name\":\"default\",\"type\":\"elasticsearch\",\"hosts\":[\"https://east-es01:9200\"],\"is_default\":true,\"is_default_monitoring\":true,\"config_yaml\":\"ssl.verification_mode: none\"}"
        echo "Fleet output updated."

        echo "=== fleet-setup complete ==="

  # Fleet Server — reads service token + policy ID from the certs volume
  # (written by setup + fleet-setup respectively).
  fleet-server:
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION}
    depends_on:
      fleet-setup:
        condition: service_completed_successfully
      east-es01:
        condition: service_healthy
    networks:
      - net-east
    ports:
      - "8220:8220"
    volumes:
      - certs:/usr/share/elastic-agent/certs:ro
      - fleet-server-data:/usr/share/elastic-agent/data
    environment:
      - FLEET_SERVER_ENABLE=1
      - FLEET_SERVER_ELASTICSEARCH_HOST=https://east-es01:9200
      - FLEET_SERVER_ELASTICSEARCH_CA=/usr/share/elastic-agent/certs/ca/ca.crt
      - FLEET_SERVER_CERT=/usr/share/elastic-agent/certs/fleet-server/fleet-server.crt
      - FLEET_SERVER_CERT_KEY=/usr/share/elastic-agent/certs/fleet-server/fleet-server.key
      - FLEET_SERVER_PORT=8220
      - FLEET_URL=https://fleet-server:8220
      - FLEET_CA=/usr/share/elastic-agent/certs/ca/ca.crt
      - CERTIFICATE_AUTHORITIES=/usr/share/elastic-agent/certs/ca/ca.crt
    # Read the service token and pre-created policy ID from files, then hand off
    # to the original docker-entrypoint (no -e: that would switch to enroll mode).
    entrypoint:
      - sh
      - -c
      - |
        FLEET_SERVER_SERVICE_TOKEN=$(cat /usr/share/elastic-agent/certs/tokens/fleet-service-token)
        FLEET_SERVER_POLICY_ID=$(cat /usr/share/elastic-agent/certs/tokens/fleet-server-policy-id)
        export FLEET_SERVER_SERVICE_TOKEN FLEET_SERVER_POLICY_ID
        exec /usr/bin/tini -- /usr/local/bin/docker-entrypoint
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -sf --cacert /usr/share/elastic-agent/certs/ca/ca.crt https://localhost:8220/api/status | grep -q HEALTHY"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  # Elastic Agent (complete image) enrolled as the docker-private synthetics location
  elastic-agent-synthetics:
    image: docker.elastic.co/elastic-agent/elastic-agent-complete:${STACK_VERSION}
    depends_on:
      fleet-server:
        condition: service_healthy
    networks:
      - net-east
    user: root
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - certs:/usr/share/elastic-agent/certs:ro
      - agent-synthetics-data:/usr/share/elastic-agent/data
    environment:
      - FLEET_ENROLL=1
      - FLEET_URL=https://fleet-server:8220
      - FLEET_CA=/usr/share/elastic-agent/certs/ca/ca.crt
      - CERTIFICATE_AUTHORITIES=/usr/share/elastic-agent/certs/ca/ca.crt
    entrypoint:
      - sh
      - -c
      - |
        FLEET_ENROLLMENT_TOKEN=$(cat /usr/share/elastic-agent/certs/tokens/agent-enrollment-token)
        export FLEET_ENROLLMENT_TOKEN
        exec /usr/bin/tini -- /usr/local/bin/docker-entrypoint -e

  # One-shot: installs the synthetics integration on the Synthetics Private
  # Location agent policy and creates HTTP + browser synthetic monitors that run
  # from within the Docker network via the docker-private private location.
  # Idempotent — skips if the sentinel file already exists.
  synthetics-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    depends_on:
      elastic-agent-synthetics:
        condition: service_started
      kibana-east:
        condition: service_healthy
    networks:
      - net-east
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command:
      - bash
      - -c
      - |
        set -e
        CA="config/certs/ca/ca.crt"
        KB="https://kibana-east:5601"

        if [ -f config/certs/tokens/synthetics-monitors-created ]; then
          echo "Synthetics monitors already created — skipping."; exit 0
        fi

        echo "=== Waiting for Kibana ==="
        until curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            "$$KB/api/status" 2>/dev/null | grep -q '"level":"available"'; do
          echo "Kibana not ready, retrying in 15s..."; sleep 15
        done

        echo "=== Getting synthetics agent policy ID ==="
        SYNTH_POLICY_ID=$$(curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          "$$KB/api/fleet/agent_policies?perPage=100" \
          | grep -oE '"id":"[^"]*","name":"Synthetics Private Location"' \
          | head -1 | grep -oE '"id":"[^"]*"' | cut -d'"' -f4)
        echo "Synthetics policy ID: $$SYNTH_POLICY_ID"

        if [ -n "$$SYNTH_POLICY_ID" ]; then
          echo "=== Ensuring synthetics integration is installed on policy ==="
          SYNTH_VER=$$(curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            "$$KB/api/fleet/epm/packages/synthetics" \
            | grep -oE '"version":"[0-9][0-9.]*"' | head -1 | cut -d'"' -f4)
          echo "Synthetics package version: $$SYNTH_VER"
          curl -s --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "$$KB/api/fleet/package_policies" \
            -H "Content-Type: application/json" -H "kbn-xsrf: true" \
            -d "{\"name\":\"synthetics-runner\",\"policy_id\":\"$$SYNTH_POLICY_ID\",\"namespace\":\"default\",\"enabled\":true,\"package\":{\"name\":\"synthetics\",\"version\":\"$$SYNTH_VER\"},\"inputs\":[]}" \
            > /dev/null || echo "  (synthetics integration may already be installed)"
        fi

        echo "=== Waiting for enrolled synthetics agent ==="
        for i in $$(seq 1 20); do
          AGENTS=$$(curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            "$$KB/api/fleet/agents?perPage=100" 2>/dev/null || echo "")
          echo "$$AGENTS" | grep -q '"active":true' && { echo "Agent enrolled."; break; }
          [ $$i -eq 20 ] && { echo "Timeout waiting for active agent."; exit 1; }
          echo "  Waiting ($$i/20)..."; sleep 15
        done

        echo "=== Getting private location ID ==="
        LOC_RESP=$$(curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          "$$KB/api/synthetics/private_locations" 2>/dev/null || echo "")
        LOC_ID=$$(echo "$$LOC_RESP" | grep -oE '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
        echo "Private location ID: $$LOC_ID"
        [ -z "$$LOC_ID" ] && { echo "No private location found — cannot create monitors."; exit 1; }

        echo "=== Writing browser journey scripts to /tmp ==="

        # ── Journey 1: Refueling Mission Ops Journey (East Gateway) ─────────────
        # A mission coordinator loads the ops gateway and steps through every
        # downstream service: Aircraft Registry (Java) → Fuel Depot (Go) →
        # Mission Costs (.NET) → AARs (PHP) → Tanker Pairings (Rust) →
        # Active Missions (Ruby).  Also exercises the aircraft registry search.
        # Each step generates a distributed APM trace spanning all 7 languages.
        EAST_SCRIPT=$'step(\'Load ops gateway\', async () => {\n  await page.goto(params.url);\n  await page.locator(\'h1.euiTitle\').waitFor({ timeout: 10000 });\n});\n\nstep(\'Fetch aircraft registry (Java)\', async () => {\n  const respPromise = page.waitForResponse(r => r.url().includes(\'/catalog\'));\n  await page.locator(\'button.btn-catalog\').click();\n  await respPromise;\n});\n\nstep(\'Check fuel depot levels (Go)\', async () => {\n  const respPromise = page.waitForResponse(r => r.url().includes(\'/inventory\'));\n  await page.locator(\'button.btn-inventory\').click();\n  await respPromise;\n});\n\nstep(\'Get mission cost rates (.NET)\', async () => {\n  const respPromise = page.waitForResponse(r => r.url().includes(\'/pricing\'));\n  await page.locator(\'button.btn-pricing\').click();\n  await respPromise;\n});\n\nstep(\'Read after action reports (PHP)\', async () => {\n  const respPromise = page.waitForResponse(r => r.url().includes(\'/reviews\'));\n  await page.locator(\'button.btn-reviews\').click();\n  await respPromise;\n});\n\nstep(\'Get tanker pairings (Rust)\', async () => {\n  const respPromise = page.waitForResponse(r => r.url().includes(\'/recommendations\'));\n  await page.locator(\'button.btn-recommendations\').click();\n  await respPromise;\n});\n\nstep(\'View active missions (Ruby)\', async () => {\n  const respPromise = page.waitForResponse(r => r.url().includes(\'/orders\'));\n  await page.locator(\'button.btn-orders\').click();\n  await respPromise;\n  const rows = await page.locator(\'#log-scroll .log-row\').count();\n  if (rows < 6) throw new Error(\'Expected at least 6 activity log rows, got \' + rows);\n});\n\nstep(\'Search aircraft registry — KC-135\', async () => {\n  const respPromise = page.waitForResponse(r => r.url().includes(\'/search\'));\n  await page.locator(\'#search-input\').fill(\'KC-135\');\n  await page.locator(\'button.search-btn\').click();\n  await respPromise;\n});'
        printf '%s\n' "$$EAST_SCRIPT" > /tmp/east-journey.js

        # ── Journey 2: APM Error Tracking & Custom Events (West Webapp) ───────
        # A QA engineer verifies APM instrumentation: triggers a ZeroDivisionError
        # to confirm APM error capture is working, then sends a custom tagged
        # message to verify custom event ingestion.
        WEST_SCRIPT=$'step(\'Load APM demo\', async () => {\n  await page.goto(params.url);\n  await page.locator(\'h1.euiTitle\').waitFor({ timeout: 10000 });\n});\n\nstep(\'Trigger ZeroDivisionError (APM error capture)\', async () => {\n  const respPromise = page.waitForResponse(r => r.url().includes(\'/error\'));\n  await page.locator(\'button.btn-danger\').click();\n  await respPromise;\n});\n\nstep(\'Send custom APM message\', async () => {\n  await page.locator(\'#msg-input\').fill(\'synthetic-monitor-check\');\n  const respPromise = page.waitForResponse(r => r.url().includes(\'/custom_message\'));\n  await page.locator(\'button.btn-primary\').click();\n  await respPromise;\n  const rows = await page.locator(\'#log-scroll .log-row\').count();\n  if (rows < 2) throw new Error(\'Expected at least 2 log entries, got \' + rows);\n});'
        printf '%s\n' "$$WEST_SCRIPT" > /tmp/west-journey.js

        # ── Journey 3: Demo Launchpad Health Check (Landing Page) ─────────────
        # Periodic check that the landing page loads, both Kibana cluster links
        # are present, the east gateway link is listed, and the demo description
        # section is intact.
        LAND_SCRIPT=$'step(\'Load demo launchpad\', async () => {\n  await page.goto(params.url);\n  await page.locator(\'h1\').waitFor({ timeout: 10000 });\n});\n\nstep(\'Verify Kibana cluster links present\', async () => {\n  await page.locator(\'a[href="https://localhost:5601"]\').waitFor({ timeout: 5000 });\n  await page.locator(\'a[href="https://localhost:5602"]\').waitFor({ timeout: 5000 });\n});\n\nstep(\'Verify east gateway link and demo description\', async () => {\n  await page.locator(\'a[href="https://localhost:8001"]\').waitFor({ timeout: 5000 });\n  await page.locator(\'h2:has-text("What this demo covers")\').waitFor({ timeout: 5000 });\n});'
        printf '%s\n' "$$LAND_SCRIPT" > /tmp/land-journey.js

        echo "=== Upserting browser monitors (delete-then-create for idempotency) ==="
        upsert_browser() {
          local MON_NAME="$$1" MON_URL="$$2" SCRIPT_FILE="$$3" SCHED="$$4"
          # Fetch all monitors; find existing by name; delete it if present
          ALL_MONS=$$(curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" "$$KB/api/synthetics/monitors?perPage=200" 2>/dev/null || echo '{"monitors":[]}')
          EXISTING_ID=$$(echo "$$ALL_MONS" | MON_NAME_ENV="$$MON_NAME" python3 -c "import sys,json,os; d=json.load(sys.stdin); [print(m['id']) for m in d.get('monitors',[]) if m.get('name')==os.environ.get('MON_NAME_ENV','')]" 2>/dev/null | head -1 || true)
          if [ -n "$$EXISTING_ID" ]; then
            curl -s --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
              -X DELETE "$$KB/api/synthetics/monitors/$$EXISTING_ID" \
              -H "kbn-xsrf: true" > /dev/null \
              && echo "  ~ removed stale: $$MON_NAME"
          fi
          # JSON-escape the script: backslash → \\, double-quote → \", newline → \n
          ESCAPED=$$(sed 's/\\/\\\\/g; s/"/\\"/g' "$$SCRIPT_FILE" | awk '{printf "%s\\n",$0}' | sed 's/\\n$$//')
          printf '{"name":"%s","type":"browser","schedule":{"number":"%s","unit":"m"},"enabled":true,"locations":[{"id":"%s","isServiceManaged":false}],"source":{"inline":{"script":"%s"}},"params":{"url":"%s"},"playwright_options":{"ignoreHTTPSErrors":true}}\n' \
            "$$MON_NAME" "$$SCHED" "$$LOC_ID" "$$ESCAPED" "$$MON_URL" > /tmp/monitor.json
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "$$KB/api/synthetics/monitors" \
            -H "Content-Type: application/json" -H "kbn-xsrf: true" \
            --data @/tmp/monitor.json > /dev/null \
            && echo "  + $$MON_NAME" || echo "  ! failed: $$MON_NAME"
        }

        upsert_browser "cluster-east | Refueling Mission Ops Journey [browser]"         "https://east-gateway:8000/"  /tmp/east-journey.js 10
        upsert_browser "cluster-west | APM Error Tracking and Custom Events [browser]" "https://west-webapp:8000/"   /tmp/west-journey.js 15
        upsert_browser "shared | Demo Launchpad Health Check [browser]"                "https://landing/"            /tmp/land-journey.js 20

        touch config/certs/tokens/synthetics-monitors-created
        echo "=== synthetics-setup complete ==="

  # Heartbeat synthetic monitoring — hits both webapps every 15s (/error) and 30s (/)
  heartbeat:
    depends_on:
      east-es01:
        condition: service_healthy
      kibana-east:
        condition: service_healthy
    image: docker.elastic.co/beats/heartbeat:${STACK_VERSION}
    user: root
    networks:
      - net-west
      - net-east
    volumes:
      - certs:/usr/share/heartbeat/certs
      - heartbeatdata:/usr/share/heartbeat/data
      - "../config/heartbeat.yml:/usr/share/heartbeat/heartbeat.yml:ro"
    environment:
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://east-es01:9200
      - KIBANA_HOSTS=https://kibana-east:5601
      - CA_CERT=certs/ca/ca.crt
    command: ["heartbeat", "-e", "--strict.perms=false"]

  # ── Traffic generator ────────────────────────────────────────────────────────
  # Continuously hits all service endpoints to generate a steady stream of APM
  # transactions and logs.  The services themselves produce time-based anomalies;
  # loadgen provides the traffic that makes those anomalies visible in ML and APM.
  loadgen:
    image: alpine/curl:latest
    networks:
      - net-east
    volumes:
      - certs:/usr/share/certs:ro
      - "../loadgen/loadgen.sh:/loadgen.sh:ro"
    entrypoint: ["/bin/sh", "/loadgen.sh"]
    environment:
      - DEV_GATEWAY_URL=https://localhost:8001
      - PROD_GATEWAY_URL=https://localhost:8002
      - WEST_WEBAPP_URL=https://localhost:8000
      - LOADGEN_INTERVAL=3
    depends_on:
      - west-webapp
      - east-gateway
      - prod-gateway
    restart: unless-stopped

  # ── ML anomaly detection setup ──────────────────────────────────────────────
  # One-shot: creates and starts ML anomaly detection jobs.
  # Includes the three built-in Observability modules (APM anomaly detection,
  # log rate analysis, log categorization) plus custom demo jobs.
  # Idempotent — uses a sentinel file on the certs volume.
  ml-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    depends_on:
      kibana-east:
        condition: service_healthy
    networks:
      - net-east
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command:
      - bash
      - -c
      - |
        set -e
        CA="config/certs/ca/ca.crt"
        ES="https://east-es01:9200"
        KB="https://kibana-east:5601"

        if [ -f config/certs/tokens/ml-jobs-created ]; then
          echo "ML jobs already created — skipping."; exit 0
        fi

        echo "=== Waiting for Elasticsearch ==="
        until curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" "$$ES/_cluster/health" | grep -qE '"status":"(green|yellow)"'; do
          echo "  ES not ready..."; sleep 15
        done

        echo "=== Waiting for Kibana ==="
        until curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" "$$KB/api/status" | grep -q '"level":"available"'; do
          echo "  Kibana not ready..."; sleep 15
        done

        # Helper: create custom job, then its datafeed, then open+start
        create_ml() {
          local JOB_ID="$$1" JOB_JSON="$$2" FEED_JSON="$$3"
          echo "--- Creating job: $$JOB_ID ---"
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X PUT "$$ES/_ml/anomaly_detectors/$$JOB_ID" \
            -H "Content-Type: application/json" -d "$$JOB_JSON" > /dev/null \
            && echo "  Job created" || { echo "  Job may already exist"; }
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X PUT "$$ES/_ml/datafeeds/datafeed-$$JOB_ID" \
            -H "Content-Type: application/json" -d "$$FEED_JSON" > /dev/null \
            && echo "  Datafeed created" || { echo "  Datafeed may already exist"; }
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "$$ES/_ml/anomaly_detectors/$$JOB_ID/_open" \
            -H "Content-Type: application/json" > /dev/null \
            && echo "  Job opened" || echo "  Job may already be open"
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "$$ES/_ml/datafeeds/datafeed-$$JOB_ID/_start" \
            -H "Content-Type: application/json" > /dev/null \
            && echo "  Datafeed started" || echo "  Datafeed may already be running"
        }

        echo "=== Setting up built-in Observability ML modules ==="

        # APM anomaly detection (Observability > APM > Anomaly detection)
        # Uses the APM API which creates the correct prefixed job for the 'production' environment
        echo "--- Setting up APM anomaly detection (production) ---"
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/internal/apm/settings/anomaly-detection/jobs" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d '{"environments":["production"]}' > /dev/null \
          && echo "  APM anomaly detection configured" || echo "  APM anomaly detection may already exist"

        # Log rate analysis and log categorization require hashed job IDs that Kibana's
        # infra plugin looks up. The hash is computed from spaceId="default" and logViewId="default"
        # using UUID v5 with namespace f91b78c0-fdd3-425d-a4ba-4c028fe57e0f.
        # Result: logs-11558ee526445db2b42eb3d6b4af58d0-{job-type}
        LOG_PREFIX="logs-11558ee526445db2b42eb3d6b4af58d0-"

        # Log rate analysis (Observability > Logs > Log rate analysis)
        echo "--- Setting up log rate analysis ---"
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/internal/ml/modules/setup/logs_ui_analysis" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d "{\"prefix\":\"$$LOG_PREFIX\",\"groups\":[\"logs\",\"observability\"],\"indexPatternName\":\"logs-*,filebeat-*\",\"startDatafeed\":true,\"start\":0}" \
          > /dev/null \
          && echo "  Log rate analysis configured" || echo "  Log rate analysis may already exist"

        # Log categorization (Observability > Logs > Log categories)
        echo "--- Setting up log categorization ---"
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/internal/ml/modules/setup/logs_ui_categories" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d "{\"prefix\":\"$$LOG_PREFIX\",\"groups\":[\"logs\",\"observability\"],\"indexPatternName\":\"logs-*,filebeat-*\",\"startDatafeed\":true,\"start\":0}" \
          > /dev/null \
          && echo "  Log categorization configured" || echo "  Log categorization may already exist"

        # Patch logs_source_config into both log jobs so Kibana doesn't flag them as
        # "outdated configuration". Kibana's infra plugin checks custom_settings.logs_source_config
        # against the current log view source; without it the jobs always appear outdated.
        # bucketSpan=900000ms (15m), indices match the infra plugin default LOGS_INDEX_PATTERN.
        # indexPattern must exactly match DEFAULT_LOG_SOURCES from @kbn/logs-data-access-plugin:
        # ['logs-*-*', 'logs-*', 'filebeat-*'] — Kibana checks isSubset against these indices.
        LOG_SOURCE_CFG='{"indexPattern":"logs-*-*,logs-*,filebeat-*","timestampField":"@timestamp","bucketSpan":900000}'
        for LOG_JOB in "log-entry-rate:ml-module-logs-ui-analysis" "log-entry-categories-count:ml-module-logs-ui-categories"; do
          JOB_TYPE="$${LOG_JOB%%:*}"
          CREATED_BY="$${LOG_JOB##*:}"
          JOB_ID="$$LOG_PREFIX$$JOB_TYPE"
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "$$ES/_ml/anomaly_detectors/$$JOB_ID/_update" \
            -H "Content-Type: application/json" \
            -d "{\"custom_settings\":{\"managed\":true,\"created_by\":\"$$CREATED_BY\",\"job_revision\":2,\"logs_source_config\":$$LOG_SOURCE_CFG}}" \
            > /dev/null \
            && echo "  Patched logs_source_config on $$JOB_ID" || echo "  Could not patch $$JOB_ID"
        done

        echo "=== Creating custom ML anomaly detection jobs ==="
        create_ml "demo-apm-error-rate" \
          '{"description":"Detects unusual error rates per service","analysis_config":{"bucket_span":"5m","detectors":[{"function":"high_count","partition_field_name":"service.name"}],"influencers":["service.name"]},"analysis_limits":{"model_memory_limit":"25mb"},"data_description":{"time_field":"@timestamp"},"model_plot_config":{"enabled":true,"annotations_enabled":true},"results_index_name":"custom-demo-ml"}' \
          '{"job_id":"demo-apm-error-rate","indices":["traces-apm*","logs-apm*"],"query":{"bool":{"filter":[{"term":{"event.outcome":"failure"}}]}}}'

        create_ml "demo-latency-outliers" \
          '{"description":"Detects services with unusually high transaction durations","analysis_config":{"bucket_span":"5m","detectors":[{"function":"high_mean","field_name":"transaction.duration.us","partition_field_name":"service.name"}],"influencers":["service.name","transaction.type"]},"analysis_limits":{"model_memory_limit":"30mb"},"data_description":{"time_field":"@timestamp"},"model_plot_config":{"enabled":true,"annotations_enabled":true},"results_index_name":"custom-demo-ml"}' \
          '{"job_id":"demo-latency-outliers","indices":["traces-apm*"],"query":{"bool":{"filter":[{"term":{"processor.event":"transaction"}}]}}}'

        create_ml "demo-log-rate" \
          '{"description":"Detects unusual warning/error log rates per service","analysis_config":{"bucket_span":"5m","detectors":[{"function":"high_count","partition_field_name":"service.name"}],"influencers":["service.name","log.level"]},"analysis_limits":{"model_memory_limit":"25mb"},"data_description":{"time_field":"@timestamp"},"model_plot_config":{"enabled":true,"annotations_enabled":true},"results_index_name":"custom-demo-ml"}' \
          '{"job_id":"demo-log-rate","indices":["filebeat-*"],"query":{"bool":{"filter":[{"exists":{"field":"service.name"}},{"terms":{"log.level":["error","warn","warning"]}}]}}}'

        mkdir -p config/certs/tokens
        touch config/certs/tokens/ml-jobs-created
        echo "=== ml-setup complete ==="

  # ── Alert setup (west NOC cluster watching east via CCS) ─────────────────────
  # One-shot: creates alerting rules in kibana-west that query east cluster data
  # via CCS.  These fire when east services degrade, demonstrating cross-cluster
  # alerting from an operations/NOC cluster.
  alert-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    depends_on:
      kibana-west:
        condition: service_healthy
    networks:
      - net-west
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command:
      - bash
      - -c
      - |
        set -e
        CA="config/certs/ca/ca.crt"
        KB="https://kibana-west:5601"

        if [ -f config/certs/tokens/alerts-created ]; then
          echo "Alerts already created — skipping."; exit 0
        fi

        echo "=== Waiting for Kibana-West ==="
        until curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            "$$KB/api/status" 2>/dev/null | grep -q '"level":"available"'; do
          echo "  Kibana not ready..."; sleep 15
        done

        echo "=== Verifying CCS connectivity ==="
        until curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            "https://west-es01:9200/_remote/info" 2>/dev/null | grep -q '"connected":true'; do
          echo "  CCS not connected..."; sleep 15
        done
        echo "CCS to cluster-east confirmed."

        echo "=== Creating cross-cluster data view in west Kibana ==="
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/api/data_views/data_view" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d '{"data_view":{"title":"cluster-east:traces-apm*","name":"East APM Traces (CCS)","timeFieldName":"@timestamp"}}' \
          > /dev/null && echo "  + East APM Traces data view" || echo "  (may already exist)"

        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/api/data_views/data_view" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d '{"data_view":{"title":"cluster-east:filebeat-*","name":"East Filebeat Logs (CCS)","timeFieldName":"@timestamp"}}' \
          > /dev/null && echo "  + East Filebeat data view" || echo "  (may already exist)"

        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/api/data_views/data_view" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d '{"data_view":{"title":"cluster-east:heartbeat-*","name":"East Heartbeat Uptime (CCS)","timeFieldName":"@timestamp"}}' \
          > /dev/null && echo "  + East Heartbeat data view" || echo "  (may already exist)"

        echo "=== Creating alerting rules ==="
        # Alert 1: High error rate on east microservices (Elasticsearch query rule)
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/api/alerting/rule" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d '{
            "name": "East Microservices — High Error Rate",
            "rule_type_id": ".es-query",
            "consumer": "alerts",
            "schedule": {"interval": "5m"},
            "params": {
              "searchType": "esQuery",
              "timeWindowSize": 5,
              "timeWindowUnit": "m",
              "threshold": [5],
              "thresholdComparator": ">",
              "size": 10,
              "esQuery": "{\"query\":{\"bool\":{\"filter\":[{\"term\":{\"event.outcome\":\"failure\"}}]}}}",
              "index": ["cluster-east:traces-apm*"],
              "timeField": "@timestamp"
            },
            "actions": [],
            "tags": ["ccs", "east-production", "error-rate"],
            "enabled": true
          }' > /dev/null && echo "  + High Error Rate alert" || echo "  (may already exist)"

        # Alert 2: East service degraded logs (watches for scenario=degraded in logs)
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/api/alerting/rule" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d '{
            "name": "East Microservices — Degraded Mode Detected",
            "rule_type_id": ".es-query",
            "consumer": "alerts",
            "schedule": {"interval": "5m"},
            "params": {
              "searchType": "esQuery",
              "timeWindowSize": 5,
              "timeWindowUnit": "m",
              "threshold": [3],
              "thresholdComparator": ">",
              "size": 10,
              "esQuery": "{\"query\":{\"bool\":{\"filter\":[{\"term\":{\"scenario\":\"degraded\"}},{\"terms\":{\"log.level\":[\"error\",\"warn\",\"warning\"]}}]}}}",
              "index": ["cluster-east:filebeat-*"],
              "timeField": "@timestamp"
            },
            "actions": [],
            "tags": ["ccs", "east-production", "degraded"],
            "enabled": true
          }' > /dev/null && echo "  + Degraded Mode alert" || echo "  (may already exist)"

        # Alert 3: East service health check failure (heartbeat)
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/api/alerting/rule" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -d '{
            "name": "East Microservices — Health Check Failure",
            "rule_type_id": ".es-query",
            "consumer": "alerts",
            "schedule": {"interval": "2m"},
            "params": {
              "searchType": "esQuery",
              "timeWindowSize": 2,
              "timeWindowUnit": "m",
              "threshold": [1],
              "thresholdComparator": ">",
              "size": 5,
              "esQuery": "{\"query\":{\"bool\":{\"filter\":[{\"term\":{\"monitor.status\":\"down\"}}]}}}",
              "index": ["cluster-east:heartbeat-*"],
              "timeField": "@timestamp"
            },
            "actions": [],
            "tags": ["ccs", "east-production", "uptime"],
            "enabled": true
          }' > /dev/null && echo "  + Health Check Failure alert" || echo "  (may already exist)"

        mkdir -p config/certs/tokens
        touch config/certs/tokens/alerts-created
        echo "=== alert-setup complete ==="

  # ── Observability alert setup (east Kibana — default observability rules) ──────
  # One-shot: creates the standard built-in alerting rules for APM, logs,
  # infrastructure, synthetics, and ML health in kibana-east.
  # Idempotent — uses a sentinel file on the certs volume.
  east-alert-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    depends_on:
      kibana-east:
        condition: service_healthy
    networks:
      - net-east
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command:
      - bash
      - -c
      - |
        set -e
        CA="config/certs/ca/ca.crt"
        KB="https://kibana-east:5601"

        if [ -f config/certs/tokens/east-alerts-created ]; then
          echo "East alerts already created — skipping."; exit 0
        fi

        echo "=== Waiting for Kibana-East ==="
        until curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            "$$KB/api/status" 2>/dev/null | grep -q '"level":"available"'; do
          echo "  Kibana not ready..."; sleep 15
        done

        create_rule() {
          local NAME="$$1" JSON="$$2"
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "$$KB/api/alerting/rule" \
            -H "Content-Type: application/json" -H "kbn-xsrf: true" \
            -d "$$JSON" > /dev/null \
            && echo "  + $$NAME" || echo "  ($$NAME may already exist)"
        }

        echo "=== Creating APM observability rules ==="

        create_rule "APM — Error Rate Threshold" \
          '{"name":"APM — Error Rate Threshold","rule_type_id":"apm.error_rate","consumer":"apm","schedule":{"interval":"5m"},"params":{"windowSize":5,"windowUnit":"m","threshold":25,"environment":"ENVIRONMENT_ALL","groupBy":["service.name","service.environment"],"useKqlFilter":false},"actions":[],"tags":["observability","apm","error-rate"],"enabled":true}'

        create_rule "APM — Transaction Error Rate Threshold" \
          '{"name":"APM — Transaction Error Rate Threshold","rule_type_id":"apm.transaction_error_rate","consumer":"apm","schedule":{"interval":"5m"},"params":{"windowSize":5,"windowUnit":"m","threshold":25,"environment":"ENVIRONMENT_ALL","groupBy":["service.name","service.environment","transaction.type"]},"actions":[],"tags":["observability","apm","error-rate"],"enabled":true}'

        create_rule "APM — P99 Latency Threshold" \
          '{"name":"APM — P99 Latency Threshold","rule_type_id":"apm.transaction_duration","consumer":"apm","schedule":{"interval":"5m"},"params":{"windowSize":5,"windowUnit":"m","threshold":1500,"environment":"ENVIRONMENT_ALL","aggregationType":"99th","groupBy":["service.name","service.environment","transaction.type"]},"actions":[],"tags":["observability","apm","latency"],"enabled":true}'

        create_rule "APM — Anomaly Detected" \
          '{"name":"APM — Anomaly Detected","rule_type_id":"apm.anomaly","consumer":"apm","schedule":{"interval":"15m"},"params":{"windowSize":30,"windowUnit":"m","anomalySeverityType":"critical","environment":"ENVIRONMENT_ALL"},"actions":[],"tags":["observability","apm","anomaly"],"enabled":true}'

        echo "=== Creating Logs observability rules ==="

        create_rule "Logs — Elevated Error Log Rate" \
          '{"name":"Logs — Elevated Error Log Rate","rule_type_id":"logs.alert.document.count","consumer":"logs","schedule":{"interval":"5m"},"params":{"timeSize":5,"timeUnit":"m","count":{"value":25,"comparator":"more than"},"criteria":[{"field":"log.level","comparator":"equals","value":"error"}],"logView":{"type":"log-view-reference","logViewId":"default"}},"actions":[],"tags":["observability","logs","error-rate"],"enabled":true}'

        echo "=== Creating Infrastructure observability rules ==="

        create_rule "Infrastructure — High CPU Usage" \
          '{"name":"Infrastructure — High CPU Usage","rule_type_id":"metrics.alert.threshold","consumer":"infrastructure","schedule":{"interval":"1m"},"params":{"criteria":[{"aggType":"avg","comparator":">","threshold":[90],"timeSize":5,"timeUnit":"m","metric":"system.cpu.total.norm.pct"}],"sourceId":"default","alertOnNoData":false,"alertOnGroupDisappear":false},"actions":[],"tags":["observability","infrastructure","cpu"],"enabled":true}'

        create_rule "Infrastructure — High Memory Usage" \
          '{"name":"Infrastructure — High Memory Usage","rule_type_id":"metrics.alert.inventory.threshold","consumer":"infrastructure","schedule":{"interval":"1m"},"params":{"nodeType":"host","criteria":[{"metric":"memory","comparator":">","threshold":[90],"timeSize":5,"timeUnit":"m","warningThreshold":[],"warningComparator":">"}],"sourceId":"default","alertOnNoData":false,"alertOnGroupDisappear":false},"actions":[],"tags":["observability","infrastructure","memory"],"enabled":true}'

        echo "=== Creating Synthetics observability rules ==="

        create_rule "Synthetics — Monitor Status" \
          '{"name":"Synthetics — Monitor Status","rule_type_id":"xpack.synthetics.alerts.monitorStatus","consumer":"uptime","schedule":{"interval":"1m"},"params":{},"actions":[],"tags":["observability","synthetics","uptime"],"enabled":true}'

        create_rule "Synthetics — TLS Certificate Expiry" \
          '{"name":"Synthetics — TLS Certificate Expiry","rule_type_id":"xpack.synthetics.alerts.tls","consumer":"uptime","schedule":{"interval":"1d"},"params":{},"actions":[],"tags":["observability","synthetics","tls"],"enabled":true}'

        echo "=== Creating ML health rules ==="

        create_rule "ML — Anomaly Detection Jobs Health" \
          '{"name":"ML — Anomaly Detection Jobs Health","rule_type_id":"xpack.ml.anomaly_detection_jobs_health","consumer":"alerts","schedule":{"interval":"15m"},"params":{"includeJobs":{"jobIds":["demo-apm-error-rate","demo-latency-outliers","demo-log-rate"]},"testsConfig":null},"actions":[],"tags":["observability","ml","health"],"enabled":true}'

        mkdir -p config/certs/tokens
        touch config/certs/tokens/east-alerts-created
        echo "=== east-alert-setup complete ==="

  # ── Security setup (east Kibana — Security solution prep) ────────────────────
  # One-shot, idempotent. Does three things in east Kibana:
  #   1. Install prepackaged detection rules (~1700) and enable them all.
  #   2. Install + start every bundled Security ML module (anomaly detection
  #      for auth, linux, network, packetbeat, cloudtrail, host, windows).
  #   3. Initialize the Entity Analytics Risk Score engine.
  # Sentinel: config/certs/tokens/east-security-created
  east-security-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    depends_on:
      kibana-east:
        condition: service_healthy
    networks:
      - net-east
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command:
      - bash
      - -c
      - |
        set -e
        CA="config/certs/ca/ca.crt"
        KB="https://kibana-east:5601"
        SENTINEL="config/certs/tokens/east-security-created"

        if [ -f "$$SENTINEL" ]; then
          echo "East security setup already done — skipping."; exit 0
        fi

        echo "=== Waiting for Kibana-East ==="
        until curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            "$$KB/api/status" 2>/dev/null | grep -q '"level":"available"'; do
          echo "  Kibana not ready..."; sleep 15
        done

        # ── 1. Install prepackaged detection rules ────────────────────────
        echo "=== Installing prepackaged detection rules ==="
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X PUT "$$KB/api/detection_engine/rules/prepackaged" \
          -H "kbn-xsrf: true" 2>/dev/null \
          | grep -oE '"rules_installed":[0-9]+' || echo "  (install may have already run)"

        # Brief pause so rule saved objects finish indexing before bulk action
        sleep 8

        # ── 2. Enable all rules (batched by severity — API caps at 1000) ──
        echo "=== Enabling detection rules (batched by severity) ==="
        for SEV in low medium high critical; do
          printf "  severity=%s: " "$$SEV"
          HTTP=$$(curl -sk --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "$$KB/api/detection_engine/rules/_bulk_action" \
            -H "Content-Type: application/json" -H "kbn-xsrf: true" \
            --max-time 180 -o /tmp/bulk.out -w "%{http_code}" \
            -d "{\"action\":\"enable\",\"query\":\"alert.attributes.params.severity: $$SEV\"}")
          if [ "$$HTTP" = "200" ]; then
            grep -oE '"succeeded":[0-9]+' /tmp/bulk.out | head -1
          else
            echo "HTTP $$HTTP"
          fi
          sleep 2
        done

        # ── 3. Install + start all bundled Security ML modules ────────────
        echo "=== Installing Security ML modules ==="
        START=$$(( ( $$(date +%s) - 1800 ) * 1000 ))
        for MOD in security_auth security_cloudtrail security_host \
                   security_linux_v3 security_network security_packetbeat \
                   security_windows_v3; do
          printf "  %s: " "$$MOD"
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "$$KB/s/default/internal/ml/modules/setup/$$MOD" \
            -H "Content-Type: application/json" -H "kbn-xsrf: true" \
            -H "elastic-api-version: 1" \
            -d "{\"prefix\":\"\",\"groups\":[\"security\"],\"startDatafeed\":true,\"start\":$$START,\"useDedicatedIndex\":false}" \
            2>/dev/null | grep -oE '"jobs":\[[^]]*\]' | head -c 60 \
            || echo "already installed or not applicable"
          echo ""
          sleep 2
        done

        # ── 4. Initialize Entity Analytics Risk Score engine ──────────────
        echo "=== Initializing Entity Analytics Risk Score engine ==="
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$KB/internal/risk_score/engine/init" \
          -H "Content-Type: application/json" -H "kbn-xsrf: true" \
          -H "elastic-api-version: 1" \
          -d '{}' 2>/dev/null | head -c 200 \
          && echo "" || echo "  (risk engine may already be initialized)"

        mkdir -p config/certs/tokens
        touch $$SENTINEL
        echo "=== east-security-setup complete ==="

  # ── SLO setup (east Kibana — APM-based SLOs for each microservice) ───────────
  # One-shot: creates availability and latency SLOs in kibana-east for all 7
  # east microservices.  Idempotent — uses a sentinel file on the certs volume.
  slo-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    depends_on:
      kibana-east:
        condition: service_healthy
    networks:
      - net-east
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command:
      - bash
      - -c
      - |
        set -e
        CA="config/certs/ca/ca.crt"
        KB="https://kibana-east:5601"

        if [ -f config/certs/tokens/slos-created ]; then
          echo "SLOs already created — skipping."; exit 0
        fi

        echo "=== Waiting for Kibana-East ==="
        until curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            "$$KB/api/status" 2>/dev/null | grep -q '"level":"available"'; do
          echo "  Kibana not ready..."; sleep 15
        done

        create_slo() {
          local NAME="$$1" JSON="$$2"
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X POST "$$KB/api/observability/slos" \
            -H "Content-Type: application/json" -H "kbn-xsrf: true" \
            -d "$$JSON" > /dev/null \
            && echo "  + $$NAME" || echo "  ($$NAME may already exist)"
        }

        echo "=== Creating SLOs ==="

        # east-gateway (user-facing fan-out; 1000ms latency budget)
        create_slo "east-gateway — Availability" \
          '{"name":"east-gateway \u2014 Availability","description":"99.5% of gateway requests succeed","indicator":{"type":"sli.apm.transactionErrorRate","params":{"service":"east-gateway","environment":"*","transactionType":"request","transactionName":"*","index":"metrics-apm*"}},"timeWindow":{"duration":"30d","type":"rolling"},"budgetingMethod":"occurrences","objective":{"target":0.995}}'
        create_slo "east-gateway — Latency" \
