  # ── Landing page ─────────────────────────────────────────────────────────────
  # Nginx with error_page 497 to redirect HTTP→HTTPS on the same port.
  landing:
    image: nginx:alpine
    ports:
      - "8080:443"
    volumes:
      - ../html:/usr/share/nginx/html:ro
      - certs:/usr/share/certs:ro
      - "../config/landing-nginx.conf:/etc/nginx/conf.d/default.conf:ro"
    networks:
      - net-east
    depends_on:
      setup:
        condition: service_healthy
    restart: unless-stopped
