        {"full_name":"Capt. Luis E. Herrera","suggest":{"input":["Herrera","Luis Herrera","A-10 pilot","Warthog pilot","CAS pilot"]},"last_name":"Herrera","first_name":"Luis","rank":"Captain","role":"pilot","primary_airframe":{"designation":"RECEIVER-A10C","name":"A-10C Thunderbolt II","category":"attack","role":"receiver","fuel_capacity_lbs":11000},"total_flight_hours":1247,"boom_qualified":false,"unit":"81st Fighter Squadron","base":"ramstein-ab","qualifications":["A-10C","CAS","aerial-refueling-receiver","night-vision","FAC-A","low-altitude"],"currency_expires":"2024-08-19"}
        ENDBULK
        sed 's/^        //' /tmp/crews.ndjson > /tmp/crews-clean.ndjson
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$ES/_bulk" -H "Content-Type: application/x-ndjson" \
          --data-binary @/tmp/crews-clean.ndjson > /dev/null && echo "  12 crew members indexed"

        echo "=== Storing usaf-smart-search template ==="
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X PUT "$$ES/_scripts/usaf-smart-search" \
          -H "Content-Type: application/json" \
          -d '{
            "script": {
              "lang": "mustache",
              "source": {
                "size": "{{#size}}{{size}}{{/size}}{{^size}}12{{/size}}",
                "query": {
                  "function_score": {
                    "query": {
                      "bool": {
                        "should": [
                          {
                            "multi_match": {
                              "query": "{{query}}",
                              "fields": ["name^3","full_name^3","description","tags^2","category","role","unit","city","icao","theater","mission_type","notes","qualifications"],
                              "fuzziness": "AUTO",
                              "type": "best_fields",
                              "boost": 1.0
                            }
                          },
                          {
                            "multi_match": {
                              "query": "{{query}}",
                              "fields": ["name.search_as_you_type","name.search_as_you_type._2gram","name.search_as_you_type._3gram"],
                              "type": "bool_prefix",
                              "boost": 0.8
                            }
                          },
                          {
                            "multi_match": {
                              "query": "{{query}}",
                              "fields": ["tanker.name","receivers.name","primary_airframe.name","tanker.designation","receivers.designation","primary_airframe.designation"],
                              "fuzziness": "AUTO",
                              "boost": 0.7
                            }
                          }
                        ],
                        "minimum_should_match": 1
                      }
                    },
                    "functions": [
                      {"filter": {"term": {"status": "active"}}, "weight": 1.5},
                      {"filter": {"term": {"tanker_capable": true}}, "weight": 1.3},
                      {"filter": {"term": {"category": "tanker"}}, "weight": 1.2}
                    ],
                    "boost_mode": "sum",
                    "score_mode": "sum"
                  }
                },
                "highlight": {
                  "pre_tags": ["<mark>"],
                  "post_tags": ["</mark>"],
                  "fields": {
                    "name": {},
                    "full_name": {},
                    "description": {},
                    "notes": {},
                    "unit": {},
                    "city": {}
                  }
                }
              }
            }
          }' && echo "  usaf-smart-search template stored" || echo "  WARNING: template store failed"

        echo "=== Refreshing all indices ==="
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$ES/aircraft,missions,airbases,crews/_refresh" > /dev/null

        echo "=== Verifying ==="
        for IDX in aircraft missions airbases crews; do
          COUNT=$$(curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            "$$ES/$$IDX/_count" | grep -oE '"count":[0-9]+' | cut -d: -f2)
          echo "  $$IDX: $$COUNT docs"
        done
        echo "=== search-setup complete ==="

  # ── Search Kibana ─────────────────────────────────────────────────────────────
  kibana-search:
    depends_on:
      search-es01:
        condition: service_healthy
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    labels:
      co.elastic.logs/module: kibana
    networks:
      - net-east
    volumes:
      - certs:/usr/share/kibana/config/certs
      - search-kibanadata:/usr/share/kibana/data
      - ../config/kibana-search.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - ${SEARCH_KIBANA_PORT}:5601
    environment:
      - SERVERNAME=kibana-search
      - ELASTICSEARCH_HOSTS=https://search-es01:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${SEARCH_KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_REPORTING_KIBANASERVER_HOSTNAME=localhost
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=config/certs/apps/apps.crt
      - SERVER_SSL_KEY=config/certs/apps/apps.key
      - SERVER_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
    mem_limit: ${SEARCH_KB_MEM_LIMIT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -I -s --cacert config/certs/ca/ca.crt https://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  # ── Microservice databases ────────────────────────────────────────────────────
  # Four databases — one per DB engine — shared by dev and prod service instances.
  # Each service seeds its own schema on startup if the table/collection is empty.

  catalog-db:
    image: postgres:16-alpine
    networks:
      - net-east
    volumes:
      - catalog-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=catalog
      - POSTGRES_USER=catalog
      - POSTGRES_PASSWORD=catalog123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 20
    labels:
      co.elastic.logs/enabled: "true"

  orders-db:
    image: mysql:8.0
    networks:
      - net-east
    volumes:
      - orders-mysqldata:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=orders
      - MYSQL_USER=orders
      - MYSQL_PASSWORD=orders123
      - MYSQL_ROOT_PASSWORD=root123
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 20
    labels:
      co.elastic.logs/enabled: "true"

  reviews-db:
    image: mongo:7
    networks:
      - net-east
    volumes:
      - reviews-mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
    labels:
      co.elastic.logs/enabled: "true"

  # Azure SQL Edge — wire-compatible with SQL Server, lower memory footprint,
  # and native ARM64 support for Apple Silicon Macs.
  pricing-db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    networks:
      - net-east
    volumes:
      - pricing-mssqldata:/var/opt/mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Pricing123!
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',1433)); s.close()\""]
      interval: 10s
      timeout: 10s
      retries: 30
    labels:
      co.elastic.logs/enabled: "true"

  # ── Development microservices ─────────────────────────────────────────────────
  # Development environment with ANOMALY_ENABLED=true — cascading degradation
  # patterns fire on a 10-minute cycle to generate ML-detectable anomalies.
  # Seven-service architecture — one service per language.
  # See compose/cluster-east-prod.yml for the stable production copy.

  east-catalog:
    build:
      context: ../app-east/catalog
    networks:
      - net-east
    labels:
      co.elastic.logs/enabled: "true"
      co.elastic.logs/json.keys_under_root: "true"
      co.elastic.logs/json.add_error_key: "true"
      co.elastic.logs/json.message_key: "message"
      co.elastic.logs/data_stream.namespace: "development"
    environment:
      - ELASTIC_APM_SERVICE_NAME=east-catalog
      - ELASTIC_APM_SECRET_TOKEN=${ELASTIC_APM_SECRET_TOKEN}
      - ELASTIC_APM_SERVER_URL=http://east-apm-server:8200
      - ELASTIC_APM_ENVIRONMENT=development
      - ANOMALY_ENABLED=true
      - DB_HOST=catalog-db
      - DB_NAME=catalog
      - DB_USER=catalog
      - DB_PASSWORD=catalog123
    depends_on:
      east-apm-server:
        condition: service_started
      catalog-db:
        condition: service_healthy

  east-inventory:
    build:
      context: ../app-east/inventory
    networks:
      - net-east
    labels:
      co.elastic.logs/enabled: "true"
      co.elastic.logs/json.keys_under_root: "true"
      co.elastic.logs/json.add_error_key: "true"
      co.elastic.logs/json.message_key: "message"
      co.elastic.logs/data_stream.namespace: "development"
    environment:
      - ELASTIC_APM_SERVICE_NAME=east-inventory
      - ELASTIC_APM_SECRET_TOKEN=${ELASTIC_APM_SECRET_TOKEN}
      - ELASTIC_APM_SERVER_URL=http://east-apm-server:8200
      - ELASTIC_APM_ENVIRONMENT=development
      - ANOMALY_ENABLED=true
    depends_on:
      - east-apm-server

  east-pricing:
    build:
      context: ../app-east/pricing
    networks:
      - net-east
    labels:
      co.elastic.logs/enabled: "true"
      co.elastic.logs/json.keys_under_root: "true"
      co.elastic.logs/json.add_error_key: "true"
      co.elastic.logs/json.message_key: "message"
      co.elastic.logs/data_stream.namespace: "development"
    environment:
      - ELASTIC_APM_SERVICE_NAME=east-pricing
      - ELASTIC_APM_SECRET_TOKEN=${ELASTIC_APM_SECRET_TOKEN}
      - ELASTIC_APM_SERVER_URL=http://east-apm-server:8200
      - ELASTIC_APM_ENVIRONMENT=development
      - ANOMALY_ENABLED=true
      - CATALOG_URL=http://east-catalog:8000
      - DB_CONNECTION=Server=pricing-db;Database=pricing;User Id=sa;Password=Pricing123!;TrustServerCertificate=True;
    depends_on:
      east-apm-server:
        condition: service_started
      pricing-db:
        condition: service_healthy

  east-reviews:
    build:
      context: ../app-east/reviews
    networks:
      - net-east
    labels:
      co.elastic.logs/enabled: "true"
      co.elastic.logs/json.keys_under_root: "true"
      co.elastic.logs/json.add_error_key: "true"
      co.elastic.logs/json.message_key: "message"
      co.elastic.logs/data_stream.namespace: "development"
    environment:
      - ELASTIC_APM_SERVICE_NAME=east-reviews
      - ELASTIC_APM_SECRET_TOKEN=${ELASTIC_APM_SECRET_TOKEN}
      - ELASTIC_APM_SERVER_URL=http://east-apm-server:8200
      - ELASTIC_APM_ENVIRONMENT=development
      - ANOMALY_ENABLED=true
      - CATALOG_URL=http://east-catalog:8000
      - MONGO_URL=mongodb://reviews-db:27017
      - MONGO_DB=reviews
    depends_on:
      east-apm-server:
        condition: service_started
      reviews-db:
        condition: service_healthy

  east-orders:
    build:
      context: ../app-east/orders
    networks:
      - net-east
    labels:
      co.elastic.logs/enabled: "true"
      co.elastic.logs/json.keys_under_root: "true"
      co.elastic.logs/json.add_error_key: "true"
      co.elastic.logs/json.message_key: "message"
      co.elastic.logs/data_stream.namespace: "development"
    environment:
      - ELASTIC_APM_SERVICE_NAME=east-orders
      - ELASTIC_APM_SECRET_TOKEN=${ELASTIC_APM_SECRET_TOKEN}
      - ELASTIC_APM_SERVER_URL=http://east-apm-server:8200
      - ELASTIC_APM_ENVIRONMENT=development
      - ANOMALY_ENABLED=true
      - INVENTORY_URL=http://east-inventory:8000
      - PRICING_URL=http://east-pricing:8000
      - MYSQL_HOST=orders-db
      - MYSQL_DATABASE=orders
      - MYSQL_USER=orders
      - MYSQL_PASSWORD=orders123
    depends_on:
      east-apm-server:
        condition: service_started
      orders-db:
        condition: service_healthy

  east-recommendations:
    build:
      context: ../app-east/recommendations
    networks:
      - net-east
    labels:
      co.elastic.logs/enabled: "true"
      co.elastic.logs/json.keys_under_root: "true"
      co.elastic.logs/json.add_error_key: "true"
      co.elastic.logs/json.message_key: "message"
      co.elastic.logs/data_stream.namespace: "development"
    environment:
      - ELASTIC_APM_SERVICE_NAME=east-recommendations
      - ELASTIC_APM_SECRET_TOKEN=${ELASTIC_APM_SECRET_TOKEN}
      # Rust service uses OTLP/HTTP to send traces to APM server
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://east-apm-server:8200
      - ELASTIC_APM_ENVIRONMENT=development
      - ANOMALY_ENABLED=true
      - CATALOG_URL=http://east-catalog:8000
      - REVIEWS_URL=http://east-reviews:8000
    depends_on:
      - east-apm-server

  east-gateway:
    build:
      context: ../app-east/gateway
    networks:
      - net-east
    ports:
      - ${EAST_WEBAPP_PORT}:8000
    labels:
      co.elastic.logs/enabled: "true"
      co.elastic.logs/json.keys_under_root: "true"
      co.elastic.logs/json.add_error_key: "true"
      co.elastic.logs/json.message_key: "message"
      co.elastic.logs/data_stream.namespace: "development"
    volumes:
      - certs:/app/certs:ro
    environment:
      - ELASTIC_APM_SECRET_TOKEN=${ELASTIC_APM_SECRET_TOKEN}
      - ELASTIC_APM_SERVER_URL=http://east-apm-server:8200
      - ELASTIC_APM_ENVIRONMENT=development
      - RUM_SERVER_URL=http://localhost:${EAST_APMSERVER_PORT}
      - CATALOG_URL=http://east-catalog:8000
      - INVENTORY_URL=http://east-inventory:8000
      - PRICING_URL=http://east-pricing:8000
      - REVIEWS_URL=http://east-reviews:8000
      - ORDERS_URL=http://east-orders:8000
      - RECOMMENDATIONS_URL=http://east-recommendations:8000
      - SEARCH_ES_URL=https://search-es01:9200
      - SEARCH_ES_PASSWORD=${ELASTIC_PASSWORD}
      - SEARCH_ES_CA=/app/certs/ca/ca.crt
    command:
      - uvicorn
      - main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --no-access-log
      - --ssl-keyfile
      - /app/certs/apps/apps.key
      - --ssl-certfile
      - /app/certs/apps/apps.crt
    depends_on:
      east-apm-server:
        condition: service_started
      east-catalog:
        condition: service_started
      east-inventory:
        condition: service_started
      east-pricing:
        condition: service_started
      east-reviews:
        condition: service_started
      east-orders:
        condition: service_started
      east-recommendations:
        condition: service_started
      search-es01:
        condition: service_healthy

  # ── Security data collection ──────────────────────────────────────────────────
  # Packetbeat and Auditbeat feed the Elastic Security solution in east Kibana.
  # Packetbeat captures network flows + application protocols (HTTP, PostgreSQL,
  # MySQL, MongoDB, TLS) between the microservices. Auditbeat captures file
  # integrity monitoring + host/process/socket/user/login events.
  #
  # Both ship to east-es01 into their own data streams (packetbeat-*, auditbeat-*)
  # — they do not touch any existing index or integration.

  # Network traffic monitor. Requires host networking to see traffic across the
  # Docker bridges between microservices (net-east bridge, etc.). On Docker
  # Desktop for Mac, enable "Host networking" in Settings → Features in
  # development for full bridge visibility.
  east-packetbeat:
    depends_on:
      east-es01:
        condition: service_healthy
    image: docker.elastic.co/beats/packetbeat:${STACK_VERSION}
    user: root
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - certs:/usr/share/packetbeat/certs
      - ../config/packetbeat.yml:/usr/share/packetbeat/packetbeat.yml:ro
      - east-packetbeatdata:/usr/share/packetbeat/data
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - EAST_ES_PORT=${EAST_ES_PORT}
    command: ["-e", "--strict.perms=false"]
    restart: on-failure

  # Audit events: file integrity + system (processes, sockets, logins, users).
  # Runs on the net-east bridge so it can reach east-es01 by service name.
  east-auditbeat:
    depends_on:
      east-es01:
        condition: service_healthy
    image: docker.elastic.co/beats/auditbeat:${STACK_VERSION}
    user: root
    pid: host
    cap_add:
      - AUDIT_CONTROL
      - AUDIT_READ
      - SYS_PTRACE
      - DAC_READ_SEARCH
    networks:
      - net-east
    volumes:
      - certs:/usr/share/auditbeat/certs
      - ../config/auditbeat.yml:/usr/share/auditbeat/auditbeat.yml:ro
      - east-auditbeatdata:/usr/share/auditbeat/data
      - certs:/audit/certs:ro
      - /:/hostfs:ro
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command: ["-e", "--strict.perms=false"]
    restart: on-failure
