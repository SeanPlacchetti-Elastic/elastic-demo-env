services:

  # ─────────────────────────────────────────────────────────────────────────────
  # CLUSTER-EAST: 3-node remote cluster
  # Datasets: web access logs, DB query perf logs, API response metrics (logs/metrics)
  #           Elasticsearch + Docker metrics (metrics)
  #           East webapp APM traces (traces)
  # ES: https://localhost:9201  Kibana: https://localhost:5602
  # All nodes on net-ccs so cluster-west can reach all 3 for CCS sniff mode
  # ─────────────────────────────────────────────────────────────────────────────
  east-es01:
    depends_on:
      setup:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    labels:
      co.elastic.logs/module: elasticsearch
    networks:
      - net-east
      - net-ccs
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - east-esdata01:/usr/share/elasticsearch/data
    ports:
      - ${EAST_ES_PORT}:9200
    environment:
      - node.name=east-es01
      - cluster.name=${EAST_CLUSTER_NAME}
      - discovery.seed_hosts=east-es01,east-es02,east-es03
      - cluster.initial_master_nodes=east-es01,east-es02,east-es03
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/east-es01/east-es01.key
      - xpack.security.http.ssl.certificate=certs/east-es01/east-es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/east-es01/east-es01.key
      - xpack.security.transport.ssl.certificate=certs/east-es01/east-es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
    mem_limit: ${EAST_ES_MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  east-es02:
    depends_on:
      setup:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    labels:
      co.elastic.logs/module: elasticsearch
    networks:
      - net-east
      - net-ccs
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - east-esdata02:/usr/share/elasticsearch/data
    environment:
      - node.name=east-es02
      - cluster.name=${EAST_CLUSTER_NAME}
      - discovery.seed_hosts=east-es01,east-es02,east-es03
      - cluster.initial_master_nodes=east-es01,east-es02,east-es03
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/east-es02/east-es02.key
      - xpack.security.http.ssl.certificate=certs/east-es02/east-es02.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/east-es02/east-es02.key
      - xpack.security.transport.ssl.certificate=certs/east-es02/east-es02.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
    mem_limit: ${EAST_ES_MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  east-es03:
    depends_on:
      setup:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    labels:
      co.elastic.logs/module: elasticsearch
    networks:
      - net-east
      - net-ccs
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - east-esdata03:/usr/share/elasticsearch/data
    environment:
      - node.name=east-es03
      - cluster.name=${EAST_CLUSTER_NAME}
      - discovery.seed_hosts=east-es01,east-es02,east-es03
      - cluster.initial_master_nodes=east-es01,east-es02,east-es03
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/east-es03/east-es03.key
      - xpack.security.http.ssl.certificate=certs/east-es03/east-es03.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/east-es03/east-es03.key
      - xpack.security.transport.ssl.certificate=certs/east-es03/east-es03.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
    mem_limit: ${EAST_ES_MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  kibana-east:
    depends_on:
      east-es01:
        condition: service_healthy
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    labels:
      co.elastic.logs/module: kibana
    networks:
      - net-east
    volumes:
      - certs:/usr/share/kibana/config/certs
      - east-kibanadata:/usr/share/kibana/data
      - ../config/kibana-east.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - ${EAST_KIBANA_PORT}:5601
    environment:
      - SERVERNAME=kibana-east
      - ELASTICSEARCH_HOSTS=https://east-es01:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${EAST_KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_REPORTING_KIBANASERVER_HOSTNAME=localhost
      - SERVER_SSL_ENABLED=true
      - SERVER_SSL_CERTIFICATE=config/certs/kibana-east/kibana-east.crt
      - SERVER_SSL_KEY=config/certs/kibana-east/kibana-east.key
      - SERVER_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - ELASTIC_APM_SECRET_TOKEN=${ELASTIC_APM_SECRET_TOKEN}
    mem_limit: ${EAST_KB_MEM_LIMIT}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -I -s --cacert config/certs/ca/ca.crt https://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  east-apm-server:
    depends_on:
      east-es01:
        condition: service_healthy
    image: docker.elastic.co/apm/apm-server:${STACK_VERSION}
    user: root
    networks:
      - net-east
    ports:
      - "${EAST_APMSERVER_PORT}:8200"
    volumes:
      - certs:/usr/share/apm-server/certs
    command: >
      apm-server -e
         -E output.elasticsearch.hosts=["east-es01:9200"]
         -E output.elasticsearch.protocol=https
         -E output.elasticsearch.username=elastic
         -E output.elasticsearch.password=${ELASTIC_PASSWORD}
         -E output.elasticsearch.ssl.enabled=true
         -E output.elasticsearch.ssl.certificate_authorities=/usr/share/apm-server/certs/ca/ca.crt
         -E output.elasticsearch.ssl.certificate=/usr/share/apm-server/certs/east-apm-server/east-apm-server.crt
         -E output.elasticsearch.ssl.key=/usr/share/apm-server/certs/east-apm-server/east-apm-server.key
         -E apm-server.rum.enabled=true
         -E apm-server.rum.allow_origins=["*"]
         -E apm-server.rum.allow_headers=["content-type"]
         -E apm-server.data_streams.namespace=development
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    logging:
      driver: 'json-file'
      options:
        max-size: '2m'
        max-file: '5'
    healthcheck:
      test: ["CMD", "curl", "--write-out", "'HTTP %{http_code}'", "--silent", "--output", "/dev/null", "http://localhost:8200/healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 120

  east-metricbeat:
    depends_on:
      east-es01:
        condition: service_healthy
      kibana-east:
        condition: service_healthy
    image: docker.elastic.co/beats/metricbeat:${STACK_VERSION}
    user: root
    networks:
      - net-east
    volumes:
      - certs:/usr/share/metricbeat/certs
      - east-metricbeatdata:/usr/share/metricbeat/data
      - "../config/east-metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro"
      - "/proc:/hostfs/proc:ro"
      - "/:/hostfs:ro"
    environment:
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://east-es01:9200
      - KIBANA_HOSTS=https://kibana-east:5601
      - CA_CERT=certs/ca/ca.crt
      - ES_CERT=certs/east-es01/east-es01.crt
      - ES_KEY=certs/east-es01/east-es01.key
    command: ["metricbeat", "-e", "--strict.perms=false"]

  east-filebeat:
    depends_on:
      east-es01:
        condition: service_healthy
    image: docker.elastic.co/beats/filebeat:${STACK_VERSION}
    user: root
    networks:
      - net-east
    volumes:
      - certs:/usr/share/filebeat/certs
      - east-filebeatdata:/usr/share/filebeat/data
      - "../east_ingest_data/:/usr/share/filebeat/ingest_data/"
      - "../config/east-filebeat.yml:/usr/share/filebeat/filebeat.yml:ro"
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://east-es01:9200
      - CA_CERT=certs/ca/ca.crt
    command: ["filebeat", "-e", "--strict.perms=false"]

  # ── Search cluster (single-node, application backend) ────────────────────────
  # Provides Elasticsearch-powered search for the microservice suite:
  # search-as-you-type, completion suggester (typeahead), and lexical search.
  # Separate from the observability cluster — this is an application dependency.
  search-es01:
    depends_on:
      setup:
        condition: service_healthy
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    labels:
      co.elastic.logs/module: elasticsearch
    networks:
      - net-east
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
      - search-esdata01:/usr/share/elasticsearch/data
    ports:
      - ${SEARCH_ES_PORT}:9200
    environment:
      - node.name=search-es01
      - cluster.name=${SEARCH_CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/search-es01/search-es01.key
      - xpack.security.http.ssl.certificate=certs/search-es01/search-es01.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/search-es01/search-es01.key
      - xpack.security.transport.ssl.certificate=certs/search-es01/search-es01.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${LICENSE}
    mem_limit: ${SEARCH_ES_MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  # One-shot: creates four search indices with mappings and bulk data.
  # aircraft   — 10 USAF aircraft with search-as-you-type and completion suggester
  # missions   — 10 refueling missions; tanker + receiver aircraft details denormalized in
  # airbases   — 8 USAF air bases with geo_point locations
  # crews      — 12 aircrew; primary_airframe details denormalized in
  # Sentinel: checks for the crews index (new) so re-runs if only aircraft exists.
  search-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    depends_on:
      search-es01:
        condition: service_healthy
    networks:
      - net-east
    volumes:
      - certs:/usr/share/elasticsearch/config/certs
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    command:
      - bash
      - -c
      - |
        set -e
        CA="config/certs/ca/ca.crt"
        ES="https://search-es01:9200"

        if curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" "$$ES/crews" > /dev/null 2>&1; then
          echo "Search indices already exist — skipping."; exit 0
        fi

        echo "=== Dropping any existing search indices ==="
        for IDX in aircraft missions airbases crews; do
          curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
            -X DELETE "$$ES/$$IDX" > /dev/null 2>&1 || true
        done

        SEARCH_SETTINGS='{"number_of_shards":1,"number_of_replicas":0,"analysis":{"analyzer":{"autocomplete":{"type":"custom","tokenizer":"standard","filter":["lowercase","edge_ngram_filter"]}},"filter":{"edge_ngram_filter":{"type":"edge_ngram","min_gram":2,"max_gram":20}}}}'

        # ── aircraft ──────────────────────────────────────────────────────────────
        echo "=== Creating aircraft index ==="
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X PUT "$$ES/aircraft" -H "Content-Type: application/json" \
          -d "{\"settings\":$$SEARCH_SETTINGS,\"mappings\":{\"properties\":{\"name\":{\"type\":\"text\",\"fields\":{\"search_as_you_type\":{\"type\":\"search_as_you_type\"},\"keyword\":{\"type\":\"keyword\"}}},\"suggest\":{\"type\":\"completion\"},\"description\":{\"type\":\"text\"},\"sku\":{\"type\":\"keyword\"},\"designation\":{\"type\":\"keyword\"},\"category\":{\"type\":\"keyword\"},\"role\":{\"type\":\"keyword\"},\"fuel_capacity_lbs\":{\"type\":\"float\"},\"fleet_count\":{\"type\":\"integer\"},\"primary_base\":{\"type\":\"keyword\"},\"tags\":{\"type\":\"keyword\"}}}}" \
          && echo "  aircraft index created"

        cat > /tmp/aircraft.ndjson << 'ENDBULK'
        {"index":{"_index":"aircraft","_id":"1"}}
        {"name":"KC-135 Stratotanker","suggest":{"input":["KC-135 Stratotanker","KC-135","Stratotanker","tanker","TANKER-135"]},"description":"Primary USAF aerial refueling tanker. Boom-equipped, offloads up to 150,000 lbs per sortie. Backbone of USAF aerial refueling since 1956, deployed across all major bases worldwide.","sku":"TANKER-135","designation":"TANKER-135","category":"tanker","role":"tanker","fuel_capacity_lbs":200000,"fleet_count":398,"primary_base":"fairchild-afb","tags":["tanker","boom","aerial-refueling","strategic","KC-135","AMC"]}
        {"index":{"_index":"aircraft","_id":"2"}}
        {"name":"KC-46A Pegasus","suggest":{"input":["KC-46A Pegasus","KC-46","Pegasus","tanker","TANKER-46A"]},"description":"Next-generation refueling tanker replacing the KC-135. Remote vision system boom, centerline drogue, and wing drogues enable simultaneous multi-receiver operations. Offloads over 207,000 lbs per sortie.","sku":"TANKER-46A","designation":"TANKER-46A","category":"tanker","role":"tanker","fuel_capacity_lbs":212000,"fleet_count":68,"primary_base":"mcconnell-afb","tags":["tanker","boom","drogue","RVS","KC-46","next-gen","AMC"]}
        {"index":{"_index":"aircraft","_id":"3"}}
        {"name":"KC-10 Extender","suggest":{"input":["KC-10 Extender","KC-10","Extender","tanker","TANKER-10"]},"description":"Large tanker-transport with the highest fuel offload capacity in the fleet at 356,000 lbs. Supports boom and drogue simultaneously. Critical for long-range strike packages and strategic airlift missions.","sku":"TANKER-10","designation":"TANKER-10","category":"tanker","role":"tanker","fuel_capacity_lbs":356000,"fleet_count":59,"primary_base":"raf-mildenhall","tags":["tanker","boom","drogue","strategic","KC-10","high-capacity","AMC"]}
        {"index":{"_index":"aircraft","_id":"4"}}
        {"name":"F-16C Fighting Falcon","suggest":{"input":["F-16C Fighting Falcon","F-16","Fighting Falcon","Viper","fighter","RECEIVER-F16C"]},"description":"Multi-role fighter with boom receptacle. Fuel capacity 7,000 lbs. Employed in CAS, tactical strike, and air defense. Requires mid-mission refueling for extended range sorties.","sku":"RECEIVER-F16C","designation":"RECEIVER-F16C","category":"fighter","role":"receiver","fuel_capacity_lbs":7000,"fleet_count":783,"primary_base":"ramstein-ab","tags":["fighter","receiver","boom-receptacle","tactical","F-16","CAS","USAFE"]}
        {"index":{"_index":"aircraft","_id":"5"}}
        {"name":"F-15E Strike Eagle","suggest":{"input":["F-15E Strike Eagle","F-15E","Strike Eagle","fighter","RECEIVER-F15E","Beagle"]},"description":"Dual-role strike fighter with 13,455 lbs fuel capacity and boom receptacle. Optimized for deep strike and air superiority. Wet-wing design maximizes internal fuel for long-duration missions.","sku":"RECEIVER-F15E","designation":"RECEIVER-F15E","category":"fighter","role":"receiver","fuel_capacity_lbs":13455,"fleet_count":218,"primary_base":"al-udeid-ab","tags":["fighter","receiver","boom-receptacle","strike","F-15","deep-strike","CENTCOM"]}
        {"index":{"_index":"aircraft","_id":"6"}}
        {"name":"B-52H Stratofortress","suggest":{"input":["B-52H Stratofortress","B-52","Stratofortress","BUFF","bomber","RECEIVER-B52H"]},"description":"Long-range strategic bomber with 312,197 lbs fuel capacity. Boom receptacle equipped. High-priority receiver due to mission criticality. Frequently refueled on deterrence patrols and long-range strike packages.","sku":"RECEIVER-B52H","designation":"RECEIVER-B52H","category":"bomber","role":"receiver","fuel_capacity_lbs":312197,"fleet_count":76,"primary_base":"minot-afb","tags":["bomber","receiver","boom-receptacle","strategic","B-52","STRATCOM","nuclear"]}
        {"index":{"_index":"aircraft","_id":"7"}}
        {"name":"F-22A Raptor","suggest":{"input":["F-22A Raptor","F-22","Raptor","stealth fighter","RECEIVER-F22A"]},"description":"Fifth-generation air superiority fighter with boom receptacle. Internal fuel capacity 18,000 lbs. Requires in-flight refueling for long-range deployment and extended combat air patrol. Low-observable design limits external tank options.","sku":"RECEIVER-F22A","designation":"RECEIVER-F22A","category":"fighter","role":"receiver","fuel_capacity_lbs":18000,"fleet_count":183,"primary_base":"kadena-ab","tags":["fighter","receiver","boom-receptacle","stealth","F-22","air-superiority","PACAF"]}
        {"index":{"_index":"aircraft","_id":"8"}}
        {"name":"A-10C Thunderbolt II","suggest":{"input":["A-10C Thunderbolt II","A-10","Thunderbolt","Warthog","attack","RECEIVER-A10C"]},"description":"Close air support aircraft with boom receptacle and 11,000 lbs fuel capacity. Refueling extends on-station time for ground support missions. Survivable, low-altitude design preferred for CAS in contested environments.","sku":"RECEIVER-A10C","designation":"RECEIVER-A10C","category":"attack","role":"receiver","fuel_capacity_lbs":11000,"fleet_count":281,"primary_base":"ramstein-ab","tags":["attack","CAS","receiver","boom-receptacle","A-10","Warthog","USAFE"]}
        {"index":{"_index":"aircraft","_id":"9"}}
        {"name":"C-17A Globemaster III","suggest":{"input":["C-17A Globemaster III","C-17","Globemaster","transport","RECEIVER-C17A"]},"description":"Strategic and tactical airlifter with boom receptacle and 35,546 lbs usable fuel. Refueling extends range for intercontinental airlift and airdrop missions. Supports both cargo and aeromedical evacuation roles.","sku":"RECEIVER-C17A","designation":"RECEIVER-C17A","category":"transport","role":"receiver","fuel_capacity_lbs":35546,"fleet_count":222,"primary_base":"joint-base-lewis-mcchord","tags":["transport","airlift","receiver","boom-receptacle","C-17","AMC","strategic-airlift"]}
        {"index":{"_index":"aircraft","_id":"10"}}
        {"name":"E-3G Sentry","suggest":{"input":["E-3G Sentry","E-3","Sentry","AWACS","ISR","RECEIVER-E3G"]},"description":"Airborne Warning and Control System (AWACS) aircraft with boom receptacle and 22,000 lbs fuel capacity. Extended refueling orbits provide persistent airspace management and battle management. High-value asset requiring tanker support for maximum on-station time.","sku":"RECEIVER-E3G","designation":"RECEIVER-E3G","category":"ISR","role":"receiver","fuel_capacity_lbs":22000,"fleet_count":31,"primary_base":"tinker-afb","tags":["ISR","AWACS","receiver","boom-receptacle","E-3","command-and-control","ACC"]}
        ENDBULK
        sed 's/^        //' /tmp/aircraft.ndjson > /tmp/aircraft-clean.ndjson
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X POST "$$ES/_bulk" -H "Content-Type: application/x-ndjson" \
          --data-binary @/tmp/aircraft-clean.ndjson > /dev/null && echo "  10 aircraft indexed"

        # ── missions ──────────────────────────────────────────────────────────────
        # Denormalized: tanker and receivers embed aircraft name, designation,
        # category, and fuel_capacity_lbs directly — no join needed.
        echo "=== Creating missions index ==="
        curl -sf --cacert $$CA -u "elastic:${ELASTIC_PASSWORD}" \
          -X PUT "$$ES/missions" -H "Content-Type: application/json" \
          -d '{"settings":{"number_of_shards":1,"number_of_replicas":0},"mappings":{"properties":{"name":{"type":"text","fields":{"search_as_you_type":{"type":"search_as_you_type"},"keyword":{"type":"keyword"}}},"suggest":{"type":"completion"},"status":{"type":"keyword"},"mission_type":{"type":"keyword"},"theater":{"type":"keyword"},"start_date":{"type":"date"},"tanker":{"type":"object","properties":{"designation":{"type":"keyword"},"name":{"type":"text"},"category":{"type":"keyword"},"fuel_capacity_lbs":{"type":"float"},"primary_base":{"type":"keyword"}}},"receivers":{"type":"object","properties":{"designation":{"type":"keyword"},"name":{"type":"text"},"category":{"type":"keyword"},"fuel_capacity_lbs":{"type":"float"}}},"fuel_transferred_lbs":{"type":"float"},"notes":{"type":"text"},"tags":{"type":"keyword"}}}}' \
          && echo "  missions index created"

