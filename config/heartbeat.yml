# ── Infrastructure (default namespace) ────────────────────────────────────────
- type: http
  id: west-kibana
  name: "cluster-west | Kibana"
  schedule: "@every 60s"
  urls: ["https://kibana-west:5601"]
  ssl:
    certificate_authorities: ["certs/ca/ca.crt"]
  check.response.status: [302]

- type: http
  id: east-kibana
  name: "cluster-east | Kibana"
  schedule: "@every 60s"
  urls: ["https://kibana-east:5601"]
  ssl:
    certificate_authorities: ["certs/ca/ca.crt"]
  check.response.status: [302]

- type: http
  id: west-es
  name: "cluster-west | Elasticsearch"
  schedule: "@every 60s"
  urls: ["https://west-es01:9200"]
  ssl:
    certificate_authorities: ["certs/ca/ca.crt"]
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}
  check.response.status: [200]

- type: http
  id: east-es
  name: "cluster-east | Elasticsearch"
  schedule: "@every 60s"
  urls: ["https://east-es01:9200"]
  ssl:
    certificate_authorities: ["certs/ca/ca.crt"]
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}
  check.response.status: [200]

setup.kibana:
  host: ${KIBANA_HOSTS}
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}
  ssl:
    enabled: true
    certificate_authorities: ${CA_CERT}

output.elasticsearch:
  hosts: ${ELASTIC_HOSTS}
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}
  ssl:
    enabled: true
    certificate_authorities: ${CA_CERT}
