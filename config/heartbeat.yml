# Heartbeat monitors — ships to east-es01
# data_stream.namespace matches the environment each monitor targets

heartbeat.monitors:

# ── West webapp (production namespace — APM goes to prod-apm-server) ─────────
- type: http
  id: west-webapp-homepage
  name: "cluster-west | Webapp Homepage"
  data_stream.namespace: production
  schedule: "@every 30s"
  urls: ["https://west-webapp:8000/"]
  ssl:
    certificate_authorities: ["certs/ca/ca.crt"]
  check.response.status: [200]

- type: http
  id: west-webapp-error-trigger
  name: "cluster-west | Webapp Error Trigger (synthetic APM errors)"
  data_stream.namespace: production
  schedule: "@every 15s"
  urls: ["https://west-webapp:8000/error"]
  ssl:
    certificate_authorities: ["certs/ca/ca.crt"]
  check.response.status: [200]

- type: http
  id: west-webapp-custom-message
  name: "cluster-west | Webapp Custom Message (synthetic APM transactions)"
  data_stream.namespace: production
  schedule: "@every 45s"
  urls: ["https://west-webapp:8000/custom_message/synthetic-heartbeat-ping"]
  ssl:
    certificate_authorities: ["certs/ca/ca.crt"]
  check.response.status: [200]

