server {
    listen 443 ssl;
    server_name localhost landing;

    ssl_certificate     /usr/share/certs/apps/apps.crt;
    ssl_certificate_key /usr/share/certs/apps/apps.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # HTTP request on an HTTPS port → redirect to HTTPS
    # $server_port is 443 (internal), so hardcode the external port
    error_page 497 =301 https://$host:8080$request_uri;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
