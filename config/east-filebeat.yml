filebeat.inputs:
# Web server access logs — Apache Combined Log Format
- type: filestream
  id: east-web-access
  paths:
    - ingest_data/web-access.log

# Database query performance logs — PostgreSQL slow query log (structured JSON)
- type: filestream
  id: east-db-queries
  paths:
    - ingest_data/db-queries.log

# API gateway response metrics — per-endpoint latency and throughput (structured JSON)
- type: filestream
  id: east-api-metrics
  paths:
    - ingest_data/api-metrics.log

filebeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true

processors:
- add_docker_metadata: ~

output.elasticsearch:
  hosts: ${ELASTIC_HOSTS}
  username: ${ELASTIC_USER}
  password: ${ELASTIC_PASSWORD}
  ssl:
    enabled: true
    certificate_authorities: ${CA_CERT}
