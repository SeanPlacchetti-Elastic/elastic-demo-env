# Elastic CCS Demo — root compose file
#
# Declares shared volumes/networks and pulls in the four logical sub-stacks.
# Requires Docker Compose v2.20+  (ships with Docker Desktop 4.22+)
#
#   docker compose up -d      — start the full environment
#   docker compose down -v    — stop everything and remove data volumes

include:
  - compose/setup.yml
  - compose/cluster-west.yml
  - compose/cluster-east.yml
  - compose/cluster-east-prod.yml
  - compose/fleet.yml

# ── Shared volumes ────────────────────────────────────────────────────────────
volumes:
  certs:
    driver: local
  # Cluster-west Elasticsearch data
  west-esdata01:
    driver: local
  west-esdata02:
    driver: local
  west-esdata03:
    driver: local
  # Cluster-east Elasticsearch data
  east-esdata01:
    driver: local
  east-esdata02:
    driver: local
  east-esdata03:
    driver: local
  # Search cluster data
  search-esdata01:
    driver: local
  # Kibana data
  west-kibanadata:
    driver: local
  east-kibanadata:
    driver: local
  # Beats data
  west-metricbeatdata:
    driver: local
  east-metricbeatdata:
    driver: local
  east-filebeatdata:
    driver: local
  heartbeatdata:
    driver: local
  # Fleet / Synthetics agent data
  fleet-server-data:
    driver: local
  agent-synthetics-data:
    driver: local

# ── Shared networks ───────────────────────────────────────────────────────────
networks:
  # Internal network for cluster-west services
  net-west:
    name: net-west
    driver: bridge
  # Internal network for cluster-east services
  net-east:
    name: net-east
    driver: bridge
  # Bridge network enabling CCS transport between the two clusters
  net-ccs:
    name: net-ccs
    driver: bridge
